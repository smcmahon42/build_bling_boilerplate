version: 2

# Dependabot runs weekly and opens PRs for dependency updates.
# Enable the ecosystems this project uses; leave others commented.

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "area:ci"

