name: security-scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 06:00 UTC

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.detect.outputs.go }}
      node: ${{ steps.detect.outputs.node }}
      python: ${{ steps.detect.outputs.python }}
      rust: ${{ steps.detect.outputs.rust }}
    steps:
      - uses: actions/checkout@v6
      - id: detect
        run: |
          set -euo pipefail
          test -f go.mod && echo "go=true" >> "$GITHUB_OUTPUT" || echo "go=false" >> "$GITHUB_OUTPUT"
          test -f package.json && echo "node=true" >> "$GITHUB_OUTPUT" || echo "node=false" >> "$GITHUB_OUTPUT"
          { test -f pyproject.toml || test -f requirements.txt; } \
            && echo "python=true" >> "$GITHUB_OUTPUT" || echo "python=false" >> "$GITHUB_OUTPUT"
          test -f Cargo.toml && echo "rust=true" >> "$GITHUB_OUTPUT" || echo "rust=false" >> "$GITHUB_OUTPUT"

  govuln:
    needs: detect
    if: needs.detect.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  npm-audit:
    needs: detect
    if: needs.detect.outputs.node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - name: npm audit (high+)
        run: |
          if [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm audit --audit-level=high
          elif [ -f yarn.lock ]; then
            npx -y yarn@latest npm audit --groups dependencies --severity=high
          else
            npm audit --audit-level=high --omit=dev
          fi

  pip-audit:
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit
        run: |
          pip install pip-audit
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          else
            pip-audit
          fi

  cargo-audit:
    needs: detect
    if: needs.detect.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit
